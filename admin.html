<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>PMEC-Admin portal</title>
  <meta name="description" content="PMEC hostel management admin panel" />
  <link rel="stylesheet" href="admin.css" />
</head>

<body>
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round" class="logo-svg" style="width:22px;height:22px;color:var(--primary);flex-shrink:0">
        <path d="M11 20A7 7 0 0 1 9.8 6.9C15.5 4.9 17 3.5 19 2c1 2 2 4.5 2 8 0 5.5-4.78 10-10 10Z" />
        <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12" />
      </svg>
      <span>PMEC</span>

    </div>
    <div class="nav-group">
      <button type="button" class="collapsible nav-group-label active">Reports</button>
      <div class="nav-content" style="display: block;">
        <a class="nav-item active" data-page="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
          </svg><span>Admin Dashboard</span></a>
      </div>
    </div>
    <div class="nav-group">
      <button type="button" class="collapsible nav-group-label">Data Management</button>
      <div class="nav-content">
        <a class="nav-item" data-page="students"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg><span>Student Details</span></a>
        <a class="nav-item" data-page="notices"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
            <polyline points="14 2 14 8 20 8" />
          </svg><span>Notices</span></a>
        <a class="nav-item" data-page="billing"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" />
            <line x1="1" y1="10" x2="23" y2="10" />
          </svg><span>Billing</span></a>
        <a class="nav-item" data-page="hostel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M3 21h18" />
            <path d="M5 21V7l7-4 7 4v14" />
            <path d="M9 21v-4a3 3 0 0 1 6 0v4" />
            <rect x="9" y="9" width="2" height="3" />
            <rect x="13" y="9" width="2" height="3" />
          </svg><span>Hostel</span></a>
      </div>
    </div>
    <div class="nav-group">
      <button type="button" class="collapsible nav-group-label">Leave &amp; Vendors</button>
      <div class="nav-content">
        <a class="nav-item" data-page="leave"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg><span>Leave Approval</span></a>
        <a class="nav-item" data-page="vendors"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg><span>Vendors</span></a>
      </div>
    </div>
  </nav>
  <!-- Main -->
  <div id="main">
    <div id="mobile-overlay" onclick="toggleSidebar()"></div>
    <header id="header">
      <div class="page-title" id="pageTitle">Admin Dashboard</div>
      <div style="display: flex; align-items: center; gap: 2px; margin-left: auto;">
        <button onclick="toggleSidebar()" aria-label="Toggle Menu"
          style="background:transparent; border:none; cursor:pointer; color:var(--header-fg); display:flex; align-items:center; padding:4px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div class="custom-theme-toggle" onclick="toggleTheme()" role="button" tabindex="0" style="margin-left: 0;">
          <div class="toggle-inner">
            <div class="slider-circle">
              <svg class="moon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
              </svg>
              <svg class="sun-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2" />
                <path d="M12 20v2" />
                <path d="m4.93 4.93 1.41 1.41" />
                <path d="m17.66 17.66 1.41 1.41" />
                <path d="M2 12h2" />
                <path d="M20 12h2" />
                <path d="m6.34 17.66-1.41 1.41" />
                <path d="m19.07 4.93-1.41 1.41" />
              </svg>
            </div>
            <div class="track-circle">
              <svg class="sun-svg-static" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2" />
                <path d="M12 20v2" />
                <path d="m4.93 4.93 1.41 1.41" />
                <path d="m17.66 17.66 1.41 1.41" />
                <path d="M2 12h2" />
                <path d="M20 12h2" />
                <path d="m6.34 17.66-1.41 1.41" />
                <path d="m19.07 4.93-1.41 1.41" />
              </svg>
              <svg class="moon-svg-static" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </header>
    <div id="content">
      <!-- Pages injected by JS -->
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="admin.js"></script>
</body>

</html>
